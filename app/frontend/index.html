<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>reps — coding gym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <span id="brand">reps</span>
    <span id="problem-title">—</span>
    <span id="timer-wrap">
      <input id="timer-minutes" type="number" min="1" max="120" value="20" />
      <button id="timer-start">Start</button>
      <button id="timer-pause">Pause</button>
      <button id="timer-reset">Reset</button>
      <span id="timer-display">20:00</span>
    </span>
    <button id="browse-btn">Browse</button>
    <button id="next-btn">What's next?</button>
  </header>

  <main id="columns">
    <section id="col-problem">
      <div id="problem-desc"></div>
      <div id="hints"></div>
      <details id="solution-block"><summary>Show solution</summary>
        <div id="solutions"></div>
      </details>
    </section>

    <section id="col-editor">
      <textarea id="code"></textarea>
      <div id="editor-actions">
        <button id="run-btn">Run</button>
        <button id="submit-btn">Submit</button>
      </div>
      <div id="rating-bar">
        <span class="rate-label">Rate this attempt:</span>
        <button class="rate" data-level="easy"   title="Solved, felt trivial — gaps grow fastest">Easy</button>
        <button class="rate" data-level="good"   title="Solved, normal effort">Good</button>
        <button class="rate" data-level="hard"   title="Solved but a real struggle — gaps grow slowest">Hard</button>
        <button class="rate" data-level="hint"   title="Needed a hint — back in ~2 days">Hint</button>
        <button class="rate" data-level="peeked" title="Read the solution / gave up — back tomorrow">Peeked</button>
      </div>
    </section>

    <section id="col-results">
      <div id="results"></div>
      <div id="notes">
        <h3>R.E.P.S. notes</h3>
        <label>Restate<textarea data-note="restate"></textarea></label>
        <label>Examples<textarea data-note="examples"></textarea></label>
        <label>Plan<textarea data-note="plan"></textarea></label>
        <label>Step &amp; speak<textarea data-note="step"></textarea></label>
      </div>
    </section>
  </main>

  <div id="browse-overlay" hidden>
    <div id="browse-panel">
      <div id="browse-head">
        <h2>All problems</h2>
        <div id="deck-toggle">
          <button class="deck active" data-track="">All</button>
          <button class="deck" data-track="coding">Coding</button>
          <button class="deck" data-track="ml">ML</button>
        </div>
        <input id="browse-search" type="text" placeholder="Search title or concept…" />
        <button id="browse-close" title="Close">✕</button>
      </div>
      <div id="browse-list"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
