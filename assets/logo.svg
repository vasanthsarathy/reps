<svg xmlns="http://www.w3.org/2000/svg" width="760" height="200" viewBox="0 0 760 200" role="img" aria-label="reps — a spaced-repetition coding-interview gym">
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5fd7bd"/>
      <stop offset="1" stop-color="#2f9e8b"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="760" height="200" rx="26" fill="#1e1e1e"/>
  <rect x="1.5" y="1.5" width="757" height="197" rx="24.5" fill="none" stroke="#303030"/>

  <!-- icon tile -->
  <rect x="36" y="36" width="128" height="128" rx="26" fill="#252526" stroke="#363636"/>

  <!-- spaced-repetition loop: an open circular arrow around the code glyph -->
  <g fill="none" stroke="url(#teal)" stroke-width="9" stroke-linecap="round">
    <path d="M67 88 A38 38 0 1 0 82 68"/>
  </g>
  <!-- arrowhead on the loop -->
  <path d="M82 52 L86 74 L66 66 Z" fill="#5fd7bd"/>

  <!-- code brackets at the center -->
  <text x="100" y="120" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace" font-size="52" font-weight="700" fill="#e6e6e6">&#123;&#125;</text>

  <!-- wordmark -->
  <text x="200" y="120" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace" font-size="86" font-weight="800" letter-spacing="-2" fill="#f4f4f4">reps</text>
  <!-- terminal cursor -->
  <rect x="418" y="55" width="22" height="66" rx="2" fill="#5fd7bd"/>

  <!-- tagline -->
  <text x="202" y="152" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="21" fill="#8b8b8b">a spaced-repetition coding-interview gym</text>
</svg>
